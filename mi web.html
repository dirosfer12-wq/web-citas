<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita | Voltex365</title>
    <link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Voltex<span>365</span></div>
        <ul class="nav-links">
            <li><a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer" class="link-youtube">YouTube</a></li>
            <li><a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" class="link-facebook">Facebook</a></li>
        </ul>
    </nav>

    <main class="booking-container">
        <header class="booking-header">
            <h1>Reserva tu Cita</h1>
            <p>Selecciona el día y la hora que mejor te acomoden.</p>
        </header>

        <form class="booking-form">
            <div class="input-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="date">Fecha</label>
                    <input type="date" id="date" required>
                </div>

                <div class="input-group">
                    <label for="time">Hora</label>
                    <input type="time" id="time" required>
                </div>
            </div>

            <div class="input-group">
                <label for="notes">Notas adicionales (Opcional)</label>
                <textarea id="notes" rows="3" placeholder="Cuéntanos brevemente el motivo de tu cita..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Confirmar Cita</button>
        </form>
    </main>

</body>
</html>
